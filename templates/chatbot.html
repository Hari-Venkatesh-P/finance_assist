<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Assist</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f11;
      --surface:   #16181c;
      --border:    #252830;
      --user-bg:   #1e2a3a;
      --user-bdr:  #2d4a6e;
      --bot-bg:    #1a1c20;
      --accent:    #4f8ef7;
      --accent-dim:#2d5499;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --error:     #ef4444;
      --success:   #22c55e;
      --radius:    14px;
      --font:      'Inter', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--muted); box-shadow: none; }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    header small {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }
    .empty-state svg { opacity: .35; margin-bottom: 6px; }
    .empty-state h2 { font-size: 17px; font-weight: 500; color: var(--text); opacity: .6; }
    .empty-state p  { font-size: 13px; max-width: 280px; line-height: 1.7; }

    /* Suggestion pills */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .suggestion-pill:hover { border-color: var(--accent-dim); color: var(--text); }

    /* Message rows */
    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }
    .avatar.bot  { background: var(--accent-dim); color: var(--accent); }
    .avatar.user { background: #2a1f4a; color: #9b7fe8; }

    .bubble {
      max-width: 68%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      background: var(--user-bg);
      border: 1px solid var(--user-bdr);
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble.error {
      background: #1f1215;
      border: 1px solid #4a1f1f;
      color: #f87171;
    }
    .bubble .meta {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
    }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce .9s ease infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 20px 20px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent-dim); }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      line-height: 1.55;
      resize: none;
      min-height: 24px;
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s, transform .1s;
    }
    .send-btn:hover:not(:disabled)  { background: #6fa4ff; }
    .send-btn:active:not(:disabled) { transform: scale(.93); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .input-hint {
      margin-top: 8px;
      font-size: 11.5px;
      color: var(--muted);
      text-align: right;
      font-family: var(--mono);
    }
    .input-hint kbd {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 4px;
      font-family: var(--mono);
      font-size: 10.5px;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="status-dot" id="statusDot"></div>
    <h1>Finance Assist</h1>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <h2>Ask me anything</h2>
      <div class="suggestions">
        <button class="suggestion-pill" onclick="fillSuggestion(this)">Summarize recent transactions</button>
        <button class="suggestion-pill" onclick="fillSuggestion(this)">Show account balance</button>
        <button class="suggestion-pill" onclick="fillSuggestion(this)">List pending payments</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="queryInput"
        placeholder="Type your message…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</div>
  </div>

</div>

<script>
  const API_URL   = 'http://localhost:8000/chat';
  const input     = document.getElementById('queryInput');
  const sendBtn   = document.getElementById('sendBtn');
  const msgBox    = document.getElementById('messages');
  const emptyEl   = document.getElementById('emptyState');
  const statusDot = document.getElementById('statusDot');

  /* ── Auto-grow textarea ── */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  /* ── Enter / Shift+Enter ── */
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* ── Suggestion pills ── */
  function fillSuggestion(el) {
    input.value = el.textContent.trim();
    input.dispatchEvent(new Event('input'));
    input.focus();
  }

  /* ── Timestamp ── */
  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  /* ── Append a message bubble ── */
  function appendMessage(text, role, isError = false) {
    emptyEl.style.display = 'none';

    const row = document.createElement('div');
    row.className = 'row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isError ? ' error' : ''}`;

    const body = document.createElement('div');
    body.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = now();

    bubble.appendChild(body);
    bubble.appendChild(meta);
    row.appendChild(avatar);
    row.appendChild(bubble);
    msgBox.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  /* ── Typing indicator ── */
  function showTyping() {
    emptyEl.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'row bot';
    row.id = 'typingRow';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';

    const dots = document.createElement('div');
    dots.className = 'typing';
    dots.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(dots);
    row.appendChild(avatar);
    row.appendChild(bubble);
    msgBox.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  function scrollToBottom() {
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  /* ── Send ── */
  async function sendMessage() {
    const query = input.value.trim();
    if (!query) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage(query, 'user');
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ query })
      });

      removeTyping();

      if (!res.ok) {
        const errText = await res.text().catch(() => res.statusText);
        appendMessage(`Server returned ${res.status}: ${errText}`, 'bot', true);
        setOffline();
        return;
      }

      const data = await res.json();

      /* Accept common response shapes */
      const reply = data?.data || "";

      appendMessage(reply, 'bot');
      setOnline();

    } catch (err) {
      removeTyping();
      const isNetwork = err instanceof TypeError;
      appendMessage(
        isNetwork
          ? `Could not reach ${API_URL}. Make sure your server is running.`
          : `Unexpected error: ${err.message}`,
        'bot', true
      );
      setOffline();
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function setOnline()  { statusDot.className = 'status-dot'; }
  function setOffline() { statusDot.className = 'status-dot offline'; }
</script>
</body>
</html>
